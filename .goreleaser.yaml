version: 2

before:
  hooks:
    - "cp plugin.json plugin.json.orig"
    - "sed -i.bak 's/\"version\": \".*\"/\"version\": \"{{ .Version }}\"/' plugin.json && rm -f plugin.json.bak"
    - >-
      python3 -c "
      import json;
      m=json.load(open('plugin.json'));
      v='{{ .Version }}';
      b='https://github.com/GoCodeAlone/workflow-plugin-teams/releases/download/v'+v+'/workflow-plugin-teams-';
      m['downloads']=[
        {'os':'linux','arch':'amd64','url':b+'linux-amd64.tar.gz'},
        {'os':'linux','arch':'arm64','url':b+'linux-arm64.tar.gz'},
        {'os':'darwin','arch':'amd64','url':b+'darwin-amd64.tar.gz'},
        {'os':'darwin','arch':'arm64','url':b+'darwin-arm64.tar.gz'}
      ];
      open('plugin.json','w').write(json.dumps(m,indent=4)+'\n')
      "

builds:
  - main: ./cmd/workflow-plugin-teams
    binary: "workflow-plugin-teams"
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X github.com/GoCodeAlone/workflow-plugin-teams/internal.Version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "workflow-plugin-teams-{{ .Os }}-{{ .Arch }}"
    files:
      - plugin.json
      - plugin.contracts.json

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
