version: 2

before:
  hooks:
    # Update plugin.json version and download URLs for the release.
    # The script uses jq (standard on Linux/macOS) so no Python dependency is needed.
    # The OS/arch list in the script intentionally mirrors builds.goos/goarch below.
    - sh scripts/update-plugin-json.sh {{ .Version }}

builds:
  - main: ./cmd/workflow-plugin-teams
    binary: "workflow-plugin-teams"
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X github.com/GoCodeAlone/workflow-plugin-teams/internal.Version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "workflow-plugin-teams-{{ .Os }}-{{ .Arch }}"
    files:
      - plugin.json
      - plugin.contracts.json

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
